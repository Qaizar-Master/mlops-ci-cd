name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull your code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Build the Docker image
      - name: Build Docker image
        run: docker build -t ml-model:${{ github.sha }} .

      # 3. Run tests inside the container
      - name: Run tests
        run: |
          docker run --rm \
            ml-model:${{ github.sha }} \
            pytest tests/ -v

      # 4. Simulate deploy to testing environment
      - name: Deploy to testing
        run: |
          echo "✅ Image ml-model:${{ github.sha }} ready for testing environment"
          echo "👉 In a real project: push to Docker Hub / deploy to Kubernetes here"

      # 5. Print result
      - name: Pipeline result
        if: always()
        run: |
          echo "Pipeline finished with status: ${{ job.status }}"