name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ml-model:${{ github.sha }} .

      - name: Save image as artifact
        run: docker save ml-model:${{ github.sha }} | gzip > ml-model.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ml-model-image
          path: ml-model.tar.gz

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: ml-model-image

      - name: Load Docker image
        run: docker load < ml-model.tar.gz

      - name: Run tests
        run: |
          docker run --rm \
            ml-model:${{ github.sha }} \
            pytest tests/ -v

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy to testing
        run: |
          echo "Image ml-model:${{ github.sha }} ready for testing"
          echo "In a real project: push to Docker Hub / Kubernetes here"

      - name: Pipeline result
        if: always()
        run: echo "Pipeline finished with status ${{ job.status }}"